<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Head -->
  <circle cx="200" cy="150" r="60" fill="url(#accent)" opacity="0.3"/>
  <circle cx="200" cy="150" r="55" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <!-- Body -->
  <ellipse cx="200" cy="320" rx="90" ry="80" fill="url(#accent)" opacity="0.2"/>
  <ellipse cx="200" cy="320" rx="85" ry="75" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Initials -->
  <text x="200" y="165" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="48" font-weight="700" fill="#a78bfa" opacity="0.9">VP</text>
</svg>
